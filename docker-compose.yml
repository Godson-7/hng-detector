version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - hng-nginx-logs:/var/log/nginx
    depends_on:
      - nextcloud
    restart: unless-stopped

  nextcloud:
    image: kefaslungu/hng-nextcloud
    volumes:
      - hng-nginx-logs:/var/log/nginx:ro
      - nextcloud-data:/var/www/html
    restart: unless-stopped

  detector:
    build: ./detector
    volumes:
      - hng-nginx-logs:/var/log/nginx:ro
    network_mode: host
    cap_add:
      - NET_ADMIN
    restart: unless-stopped
    depends_on:
      - nginx

volumes:
  hng-nginx-logs:
    name: HNG-nginx-logs
  nextcloud-data:
